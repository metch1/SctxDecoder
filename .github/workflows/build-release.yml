name: Build and Release SctxDecoder

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    build:
        strategy:
            matrix:
                include:
                    - os: windows-latest
                      rid: win-x64
                      artifact: SctxDecoder.exe
                      output-path: release/win-x64

                    - os: ubuntu-latest
                      rid: linux-x64
                      artifact: SctxDecoder
                      output-path: release/linux-x64

                    #    - os: macos-13
                    #      rid: osx-x64
                    #      artifact: SctxDecoder
                    #      output-path: release/osx-x64

                    - os: macos-14
                      rid: osx-arm64
                      artifact: SctxDecoder
                      output-path: release/osx-arm64

        runs-on: ${{ matrix.os }}

        steps:
            - uses: actions/checkout@v4

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: "10.0.x"

            - name: Install AOT prerequisites (Linux)
              if: matrix.os == 'ubuntu-latest'
              run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

            - name: Restore dependencies
              run: dotnet restore -r ${{ matrix.rid }}

            - name: Publish (${{ matrix.rid }})
              run: dotnet publish -c Release -r ${{ matrix.rid }} --self-contained true -p:PublishAot=true -o ${{ matrix.output-path }}

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.rid }}
                  path: ${{ matrix.output-path }}

    release:
        needs: build
        runs-on: ubuntu-latest
        if: startsWith(github.ref, 'refs/tags/')

        steps:
            - uses: actions/checkout@v4

            - name: Download artifacts
              uses: actions/download-artifact@v4
              with:
                  path: artifacts

            - name: Package release
              run: |
                  mkdir -p release-assets

                  # Drop debug symbols from the published output
                  find artifacts -type f \( -name "*.dbg" -o -name "*.pdb" \) -delete

                  # Windows ZIP
                  if [ -d "artifacts/win-x64" ]; then
                    zip -r -j release-assets/SctxDecoder-win-x64.zip artifacts/win-x64
                  fi

                  # Linux TAR
                  if [ -d "artifacts/linux-x64" ]; then
                    tar -czf release-assets/SctxDecoder-linux-x64.tar.gz -C artifacts/linux-x64 .
                  fi

                  # macOS x64 (Intel) TAR
                  if [ -d "artifacts/osx-x64" ]; then
                    tar -czf release-assets/SctxDecoder-osx-x64.tar.gz -C artifacts/osx-x64 .
                  fi

                  # macOS arm64 (Apple Silicon) TAR
                  if [ -d "artifacts/osx-arm64" ]; then
                    tar -czf release-assets/SctxDecoder-osx-arm64.tar.gz -C artifacts/osx-arm64 .
                  fi

                  ls -lah release-assets

            - name: Create Release
              uses: softprops/action-gh-release@v1
              with:
                  files: release-assets/*
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
